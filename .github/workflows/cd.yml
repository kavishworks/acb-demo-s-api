name: CD - Deploy to CloudHub 2.0

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["CI - Build and Test"]
    types:
      - completed
    branches: [ main ]

env:
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Xmx1024m -XX:MaxPermSize=128m

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.workflow_run.conclusion == 'success'
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: .m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
          
    - name: Set up Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 
                                      http://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>mule-enterprise</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>cloudhub2-deployment</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
          </servers>
        </settings>
        EOF
      env:
        ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
        ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        
    - name: Build application
      run: mvn clean package -DskipTests
      
    - name: Deploy to CloudHub 2.0 Development
      run: |
        mvn deploy -DmuleDeploy \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
          -Dcloudhub2.applicationName="${{ vars.APP_NAME_DEV }}" \
          -Dcloudhub2.environment="${{ vars.ENVIRONMENT_DEV }}" \
          -Dcloudhub2.businessGroup="${{ vars.BUSINESS_GROUP }}" \
          -Dcloudhub2.replicas=1 \
          -Dcloudhub2.vCores=0.1 \
          -Dcloudhub2.deploymentTimeout=1000000
          
    - name: Health check
      run: |
        echo "Waiting for application to start..."
        sleep 60
        # Add health check endpoint call here
        echo "Application deployed successfully to Development"
        
  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: success()
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: .m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
          
    - name: Set up Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 
                                      http://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>mule-enterprise</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>cloudhub2-deployment</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
          </servers>
        </settings>
        EOF
      env:
        ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
        ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        
    - name: Build application
      run: mvn clean package -DskipTests
      
    - name: Deploy to CloudHub 2.0 Staging
      run: |
        mvn deploy -DmuleDeploy \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
          -Dcloudhub2.applicationName="${{ vars.APP_NAME_STAGING }}" \
          -Dcloudhub2.environment="${{ vars.ENVIRONMENT_STAGING }}" \
          -Dcloudhub2.businessGroup="${{ vars.BUSINESS_GROUP }}" \
          -Dcloudhub2.replicas=2 \
          -Dcloudhub2.vCores=0.2 \
          -Dcloudhub2.deploymentTimeout=1000000
          
    - name: Run integration tests
      run: |
        echo "Running integration tests against staging environment..."
        # Add integration test commands here
        
    - name: Health check
      run: |
        echo "Waiting for application to start..."
        sleep 60
        # Add health check endpoint call here
        echo "Application deployed successfully to Staging"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: .m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
          
    - name: Set up Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 
                                      http://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>mule-enterprise</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>cloudhub2-deployment</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
          </servers>
        </settings>
        EOF
      env:
        ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
        ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        
    - name: Build application
      run: mvn clean package -DskipTests
      
    - name: Deploy to CloudHub 2.0 Production
      run: |
        mvn deploy -DmuleDeploy \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
          -Dcloudhub2.applicationName="${{ vars.APP_NAME_PROD }}" \
          -Dcloudhub2.environment="${{ vars.ENVIRONMENT_PROD }}" \
          -Dcloudhub2.businessGroup="${{ vars.BUSINESS_GROUP }}" \
          -Dcloudhub2.replicas=3 \
          -Dcloudhub2.vCores=0.5 \
          -Dcloudhub2.deploymentTimeout=1000000 \
          -Dcloudhub2.enableHighAvailability=true
          
    - name: Health check
      run: |
        echo "Waiting for application to start..."
        sleep 90
        # Add health check endpoint call here
        echo "Application deployed successfully to Production"
        
    - name: Notify deployment success
      run: |
        echo "🚀 Production deployment completed successfully!"
        # Add notification logic (Slack, Teams, email, etc.)
