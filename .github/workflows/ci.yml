name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Xmx1024m -XX:MaxPermSize=128m

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: .m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
          
    - name: Set up Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 
                                      http://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>anypoint-exchange-v3</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
            <server>
              <id>mule-enterprise</id>
              <username>${env.ANYPOINT_USERNAME}</username>
              <password>${env.ANYPOINT_PASSWORD}</password>
            </server>
          </servers>
        </settings>
        EOF
      env:
        ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
        ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        
    - name: Validate Maven project
      run: mvn validate
      
    - name: Compile application
      run: mvn clean compile
      
    - name: Run tests
      run: mvn test
      
    - name: Package application
      run: mvn package -DskipTests
      
    - name: Run MUnit tests with coverage
      run: mvn clean test -Dmunit.coverage.report=true
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/site/munit/coverage/
          
    - name: Upload application artifact
      uses: actions/upload-artifact@v4
      with:
        name: mule-application
        path: target/*.jar
        
    - name: Code quality check
      run: |
        echo "Running code quality checks..."
        # Add SonarQube or other quality gates here if needed
        
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run dependency vulnerability scan
      run: |
        echo "Running security vulnerability scan..."
        # Add OWASP dependency check or similar security scanning
        
    - name: Run SAST scan
      run: |
        echo "Running static application security testing..."
        # Add CodeQL or similar SAST tools
